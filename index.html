<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyANFlLyUHL7S9z286Tm4IONDOj5sL7H6Eg",
  authDomain: "bermejo-cuentas.firebaseapp.com",
  projectId: "bermejo-cuentas",
  storageBucket: "bermejo-cuentas.firebasestorage.app",
  messagingSenderId: "743291060850",
  appId: "1:743291060850:web:a0cdba00636fcc076478eb"
};
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const DEBTS_COLLECTION = "deudas";
const CLIENTES_COLLECTION = "clientes";

db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
  console.warn("Persistencia offline no disponible:", err.code);
});

// Las zonas ya no son fijas: se arman a partir de lo que el usuario va escribiendo

const STATUS_META = {
  vencido:    { label: "Vencido",    fg: "#B42318", bg: "#FEE4E2", dot: "#DC2626" },
  porVencer:  { label: "Por vencer", fg: "#B54708", bg: "#FEF0C7", dot: "#D97706" },
  alDia:      { label: "Al día",     fg: "#175CD3", bg: "#EFF4FF", dot: "#2970FF" },
  cobrado:    { label: "Cobrado",    fg: "#087443", bg: "#E7F6EC", dot: "#12894F" },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function daysDiff(dateISO) {
  const d = new Date(dateISO + "T00:00:00");
  const t = new Date(todayISO() + "T00:00:00");
  return Math.round((t - d) / 86400000);
}
function money(n) { return "$" + Number(n || 0).toLocaleString("es-AR"); }
function fmtDate(iso) {
  if (!iso) return "-";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function waLink(phone) {
  const clean = (phone || "").replace(/[^0-9]/g, "");
  return `https://wa.me/${clean}`;
}
function statusOf(debt) {
  if (debt.estado === "cobrado") return "cobrado";
  const dd = daysDiff(debt.fechaLimite);
  if (dd > 0) return "vencido";
  if (dd >= -2) return "porVencer";
  return "alDia";
}

function setSyncStatus(ok, connecting) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  if (connecting) { el.textContent = "● Conectando..."; el.style.color = "#94A3B8"; return; }
  el.textContent = ok ? "● Sincronizado" : "● Sin conexión (guardando local)";
  el.style.color = ok ? "#4ADE80" : "#F87171";
}

let debts = [];
let clientesData = [];
let expandedClient = null;
let dataLoaded = false;
let clientesLoaded = false;
let editingClienteId = null;

function attachListener() {
  db.collection(DEBTS_COLLECTION).onSnapshot(
    (snapshot) => {
      debts = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      dataLoaded = true;
      setSyncStatus(true);
      render();
    },
    (err) => {
      setSyncStatus(false);
    }
  );
  db.collection(CLIENTES_COLLECTION).onSnapshot(
    (snapshot) => {
      clientesData = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      clientesLoaded = true;
      renderClientes();
      updateClienteOptions();
    },
    (err) => {}
  );
}

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

auth.onAuthStateChanged((user) => {
  const loginScreen = document.getElementById("loginScreen");
  const appContent = document.getElementById("appContent");
  if (user) {
    loginScreen.style.display = "none";
    appContent.style.display = "block";
    attachListener();
  } else {
    loginScreen.style.display = "flex";
    appContent.style.display = "none";
  }
});

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";
  if (!email || !password) {
    errEl.textContent = "Completá el email y la contraseña.";
    errEl.style.display = "block";
    return;
  }
  auth.signInWithEmailAndPassword(email, password).catch((err) => {
    errEl.textContent = "Email o contraseña incorrectos.";
    errEl.style.display = "block";
  });
});

document.getElementById("loginPassword").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut();
});

// (las opciones de zona se generan dinámicamente en updateZonaOptions, llamada desde render)

document.getElementById("f_fechaEntrega").value = todayISO();
document.getElementById("f_fechaLimite").value = todayISO();

function getClients() {
  const map = new Map();
  for (const d of debts) {
    const key = d.cliente.trim().toLowerCase();
    if (!map.has(key)) map.set(key, { cliente: d.cliente, zona: d.zona, telefono: d.telefono, debts: [] });
    const c = map.get(key);
    c.debts.push(d);
    c.zona = d.zona || c.zona;
    c.telefono = d.telefono || c.telefono;
  }
  return Array.from(map.values()).map(c => {
    const saldoPendiente = c.debts.filter(d => d.estado !== "cobrado").reduce((s, d) => s + Number(d.monto || 0), 0);
    const peorEstado = c.debts.some(d => statusOf(d) === "vencido") ? "vencido"
      : c.debts.some(d => statusOf(d) === "porVencer") ? "porVencer"
      : c.debts.every(d => statusOf(d) === "cobrado") ? "cobrado" : "alDia";
    return { ...c, saldoPendiente, peorEstado };
  });
}

function updateZonaOptions() {
  const fromDebts = debts.map(d => (d.zona || "").trim());
  const fromClientes = clientesData.map(c => (c.zona || "").trim());
  const zonas = Array.from(new Set([...fromDebts, ...fromClientes].filter(Boolean))).sort();

  const datalist = document.getElementById("zonaOptions");
  datalist.innerHTML = zonas.map(z => `<option value="${escapeHtml(z)}"></option>`).join("");

  const zonaFilterEl = document.getElementById("zonaFilter");
  const current = zonaFilterEl.value || "Todas";
  zonaFilterEl.innerHTML = `<option value="Todas">Todas las zonas</option>` +
    zonas.map(z => `<option value="${escapeHtml(z)}">${escapeHtml(z)}</option>`).join("");
  zonaFilterEl.value = zonas.includes(current) || current === "Todas" ? current : "Todas";
}

function getClienteDirectory() {
  const map = new Map();
  for (const c of clientesData) {
    const key = (c.nombre || "").trim().toLowerCase();
    if (!key) continue;
    map.set(key, { cliente: c.nombre, zona: c.zona, telefono: c.telefono, id: c.id });
  }
  return map;
}

function updateClienteOptions() {
  const dir = getClienteDirectory();
  const datalist = document.getElementById("clienteOptions");
  const names = Array.from(dir.values()).map(d => d.cliente).sort();
  datalist.innerHTML = names.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
}

const tabDeudas = document.getElementById("tabDeudas");
const tabClientes = document.getElementById("tabClientes");
const viewDeudas = document.getElementById("viewDeudas");
const viewClientes = document.getElementById("viewClientes");
const fabBtnEl = document.getElementById("fabBtn");
const fabClienteBtnEl = document.getElementById("fabClienteBtn");

tabDeudas.addEventListener("click", () => {
  tabDeudas.classList.add("active");
  tabClientes.classList.remove("active");
  viewDeudas.style.display = "block";
  viewClientes.style.display = "none";
  fabBtnEl.style.display = "flex";
  fabClienteBtnEl.style.display = "none";
});
tabClientes.addEventListener("click", () => {
  tabClientes.classList.add("active");
  tabDeudas.classList.remove("active");
  viewClientes.style.display = "block";
  viewDeudas.style.display = "none";
  fabClienteBtnEl.style.display = "flex";
  fabBtnEl.style.display = "none";
  renderClientes();
});

document.getElementById("clienteSearchInput").addEventListener("input", renderClientes);

function renderClientes() {
  const listEl = document.getElementById("clientesList");
  if (!listEl) return;
  if (!clientesLoaded) {
    listEl.innerHTML = `<div class="empty-msg">Sincronizando datos...</div>`;
    return;
  }
  const query = (document.getElementById("clienteSearchInput").value || "").toLowerCase();
  const filtered = clientesData
    .filter(c => !query || (c.nombre || "").toLowerCase().includes(query))
    .sort((a, b) => (a.nombre || "").localeCompare(b.nombre || ""));

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-msg">${clientesData.length === 0 ? "Todavía no diste de alta ningún cliente. Tocá + para agregar el primero." : "No hay clientes que coincidan con la búsqueda."}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(c => {
    const saldo = debts
      .filter(d => (d.cliente || "").trim().toLowerCase() === (c.nombre || "").trim().toLowerCase() && d.estado !== "cobrado")
      .reduce((s, d) => s + Number(d.monto || 0), 0);
    return `<div class="cliente-row">
      <div class="cliente-info" onclick="openEditCliente('${escapeAttr(c.id)}')" style="cursor:pointer;">
        <div class="cliente-nombre">${escapeHtml(c.nombre)}</div>
        <div class="cliente-meta">${c.zona ? "📍 " + escapeHtml(c.zona) : "Sin zona"}${c.telefono ? " · " + escapeHtml(c.telefono) : ""}</div>
      </div>
      <div class="cliente-actions">
        <span class="num" style="font-weight:700; font-size:13px; color:${saldo > 0 ? '#1E293B' : '#12894F'};">${money(saldo)}</span>
        ${c.telefono ? `<a class="wa-btn" href="${waLink(c.telefono)}" target="_blank">💬</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

function openNewCliente() {
  editingClienteId = null;
  document.getElementById("clienteModalTitle").textContent = "Nuevo cliente";
  document.getElementById("c_nombre").value = "";
  document.getElementById("c_zona").value = "";
  document.getElementById("c_telefono").value = "";
  document.getElementById("clienteFormError").style.display = "none";
  document.getElementById("deleteClienteBtn").style.display = "none";
  document.getElementById("clienteModalOverlay").style.display = "flex";
}

function openEditCliente(id) {
  const c = clientesData.find(x => x.id === id);
  if (!c) return;
  editingClienteId = id;
  document.getElementById("clienteModalTitle").textContent = "Editar cliente";
  document.getElementById("c_nombre").value = c.nombre || "";
  document.getElementById("c_zona").value = c.zona || "";
  document.getElementById("c_telefono").value = c.telefono || "";
  document.getElementById("clienteFormError").style.display = "none";
  document.getElementById("deleteClienteBtn").style.display = "block";
  document.getElementById("clienteModalOverlay").style.display = "flex";
}

const clienteModalOverlay = document.getElementById("clienteModalOverlay");
fabClienteBtnEl.addEventListener("click", openNewCliente);
document.getElementById("closeClienteModalBtn").addEventListener("click", () => { clienteModalOverlay.style.display = "none"; });
clienteModalOverlay.addEventListener("click", (e) => { if (e.target === clienteModalOverlay) clienteModalOverlay.style.display = "none"; });

document.getElementById("saveClienteBtn").addEventListener("click", () => {
  const nombre = document.getElementById("c_nombre").value.trim();
  const zona = document.getElementById("c_zona").value.trim();
  const telefono = document.getElementById("c_telefono").value.trim();
  const errEl = document.getElementById("clienteFormError");

  if (!nombre) { errEl.textContent = "Falta el nombre del cliente."; errEl.style.display = "block"; return; }

  const dup = clientesData.find(c => c.nombre.trim().toLowerCase() === nombre.toLowerCase() && c.id !== editingClienteId);
  if (dup) { errEl.textContent = "Ya existe un cliente con ese nombre."; errEl.style.display = "block"; return; }

  errEl.style.display = "none";
  const data = { nombre, zona, telefono };
  const promise = editingClienteId
    ? db.collection(CLIENTES_COLLECTION).doc(editingClienteId).update(data)
    : db.collection(CLIENTES_COLLECTION).add(data);

  promise.catch(() => alert("No se pudo guardar. Revisá tu conexión."));
  clienteModalOverlay.style.display = "none";
});

document.getElementById("deleteClienteBtn").addEventListener("click", () => {
  if (!editingClienteId) return;
  if (!confirm("¿Eliminar este cliente? Las deudas ya cargadas con su nombre no se borran.")) return;
  db.collection(CLIENTES_COLLECTION).doc(editingClienteId).delete()
    .catch(() => alert("No se pudo eliminar. Revisá tu conexión."));
  clienteModalOverlay.style.display = "none";
});

function render() {
  updateZonaOptions();
  updateClienteOptions();
  const query = document.getElementById("searchInput").value.toLowerCase();
  const zonaFilter = document.getElementById("zonaFilter").value;
  const estadoFilter = document.getElementById("estadoFilter").value;

  const clients = getClients();

  const totalPendiente = debts.filter(d => d.estado !== "cobrado").reduce((s, d) => s + Number(d.monto || 0), 0);
  document.getElementById("totalPendiente").textContent = money(totalPendiente);

  // alerts ticket
  const alertsToday = debts.filter(d => d.estado !== "cobrado" && (statusOf(d) === "vencido" || statusOf(d) === "porVencer"))
    .sort((a, b) => daysDiff(b.fechaLimite) - daysDiff(a.fechaLimite));
  const ticket = document.getElementById("ticket");
  const alertsList = document.getElementById("alertsList");
  if (alertsToday.length > 0) {
    ticket.style.display = "block";
    document.getElementById("ticketCount").textContent = `Para cobrar hoy (${alertsToday.length})`;
    alertsList.innerHTML = alertsToday.slice(0, 6).map(d => {
      const s = STATUS_META[statusOf(d)];
      const dd = daysDiff(d.fechaLimite);
      const sub = dd > 0 ? `Vencida hace ${dd} día${dd === 1 ? "" : "s"}` : dd === 0 ? "Vence hoy" : `Vence en ${-dd} día${-dd === 1 ? "" : "s"}`;
      return `<div class="alert-row">
        <div style="min-width:0;">
          <div class="alert-name">${escapeHtml(d.cliente)}</div>
          <div class="alert-sub">${sub}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <span class="num" style="font-weight:700;color:${s.fg};">${money(d.monto)}</span>
          ${d.telefono ? `<a class="wa-btn" href="${waLink(d.telefono)}" target="_blank">💬</a>` : ""}
        </div>
      </div>`;
    }).join("");
  } else {
    ticket.style.display = "none";
  }

  // filter clients
  let filtered = clients.filter(c => {
    if (query && !c.cliente.toLowerCase().includes(query)) return false;
    if (zonaFilter !== "Todas" && c.zona !== zonaFilter) return false;
    if (estadoFilter === "Con deuda" && c.saldoPendiente <= 0) return false;
    if (estadoFilter === "Vencido" && c.peorEstado !== "vencido") return false;
    if (estadoFilter === "Por vencer" && c.peorEstado !== "porVencer") return false;
    return true;
  }).sort((a, b) => b.saldoPendiente - a.saldoPendiente);

  const listEl = document.getElementById("clientList");
  if (!dataLoaded) {
    listEl.innerHTML = `<div class="empty-msg">Sincronizando datos...</div>`;
    return;
  }
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-msg">${debts.length === 0 ? "Todavía no cargaste ninguna deuda. Tocá + para agregar la primera." : "No hay clientes que coincidan con la búsqueda."}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(c => {
    const s = STATUS_META[c.peorEstado];
    const isOpen = expandedClient === c.cliente;
    const debtsHtml = c.debts.sort((a, b) => a.fechaEntrega < b.fechaEntrega ? 1 : -1).map(d => {
      const ds = STATUS_META[statusOf(d)];
      return `<div class="debt-row">
        <div style="min-width:0;">
          <div class="debt-dates">${fmtDate(d.fechaEntrega)} · vence ${fmtDate(d.fechaLimite)}</div>
          <span class="badge" style="background:${ds.bg};color:${ds.fg};">${ds.label}</span>
        </div>
        <div class="debt-actions">
          <span class="num" style="font-weight:700;font-size:13px;">${money(d.monto)}</span>
          ${d.estado === "cobrado"
            ? `<button class="icon-btn" style="background:#E7F6EC;color:#12894F;" onclick="markPendiente('${d.id}')" title="Marcar como pendiente">✓</button>`
            : `<button class="icon-btn" style="background:#fff;border:1px solid #D0D5DD;color:#475569;" onclick="markCobrado('${d.id}')" title="Marcar como cobrado">✓</button>`}
          <button class="icon-btn" style="background:#FEE4E2;color:#B42318;" onclick="removeDebt('${d.id}')" title="Eliminar">🗑</button>
        </div>
      </div>`;
    }).join("");

    return `<div class="client-card">
      <button class="client-head" onclick="toggleClient('${escapeAttr(c.cliente)}')">
        <div style="min-width:0;flex:1;">
          <div class="client-name-row">
            <span class="dot" style="background:${s.dot};"></span>
            <span class="client-name">${escapeHtml(c.cliente)}</span>
          </div>
          ${c.zona ? `<div class="client-zona">📍 ${escapeHtml(c.zona)}</div>` : ""}
        </div>
        <div class="client-right">
          <span class="client-saldo num" style="color:${c.saldoPendiente > 0 ? '#1E293B' : '#12894F'};">${money(c.saldoPendiente)}</span>
          <span>${isOpen ? "▲" : "▼"}</span>
        </div>
      </button>
      <div class="client-body" style="display:${isOpen ? "block" : "none"};">
        ${debtsHtml}
        ${c.telefono ? `<a class="wa-link-full" href="${waLink(c.telefono)}" target="_blank">💬 Escribir a ${escapeHtml(c.cliente.split(" ")[0])}</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str) { return String(str).replace(/'/g, "\\'"); }

function toggleClient(cliente) {
  expandedClient = expandedClient === cliente ? null : cliente;
  render();
}
function markCobrado(id) {
  db.collection(DEBTS_COLLECTION).doc(id).update({ estado: "cobrado", fechaCobro: todayISO() })
    .catch(() => alert("No se pudo actualizar. Revisá tu conexión."));
}
function markPendiente(id) {
  db.collection(DEBTS_COLLECTION).doc(id).update({ estado: "pendiente", fechaCobro: firebase.firestore.FieldValue.delete() })
    .catch(() => alert("No se pudo actualizar. Revisá tu conexión."));
}
function removeDebt(id) {
  if (!confirm("¿Eliminar esta deuda?")) return;
  db.collection(DEBTS_COLLECTION).doc(id).delete()
    .catch(() => alert("No se pudo eliminar. Revisá tu conexión."));
}

document.getElementById("f_cliente").addEventListener("input", (e) => {
  const dir = getClienteDirectory();
  const match = dir.get(e.target.value.trim().toLowerCase());
  if (match) {
    const zonaEl = document.getElementById("f_zona");
    const telEl = document.getElementById("f_telefono");
    if (!zonaEl.value) zonaEl.value = match.zona || "";
    if (!telEl.value) telEl.value = match.telefono || "";
  }
});

document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("zonaFilter").addEventListener("change", render);
document.getElementById("estadoFilter").addEventListener("change", render);

const modalOverlay = document.getElementById("modalOverlay");
document.getElementById("fabBtn").addEventListener("click", () => { modalOverlay.style.display = "flex"; });
document.getElementById("closeModalBtn").addEventListener("click", () => { modalOverlay.style.display = "none"; });
modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) modalOverlay.style.display = "none"; });

document.getElementById("saveDebtBtn").addEventListener("click", () => {
  const cliente = document.getElementById("f_cliente").value.trim();
  const zona = document.getElementById("f_zona").value;
  const telefono = document.getElementById("f_telefono").value.trim();
  const monto = Number(document.getElementById("f_monto").value);
  const fechaEntrega = document.getElementById("f_fechaEntrega").value;
  const fechaLimite = document.getElementById("f_fechaLimite").value;
  const detalle = document.getElementById("f_detalle").value.trim();
  const errEl = document.getElementById("formError");

  if (!cliente) { errEl.textContent = "Falta el nombre del cliente."; errEl.style.display = "block"; return; }
  if (!monto || monto <= 0) { errEl.textContent = "Falta el monto de la deuda."; errEl.style.display = "block"; return; }
  if (!fechaLimite) { errEl.textContent = "Falta la fecha límite de pago."; errEl.style.display = "block"; return; }

  errEl.style.display = "none";

  const dirNow = getClienteDirectory();
  const existing = dirNow.get(cliente.toLowerCase());
  if (!existing) {
    db.collection(CLIENTES_COLLECTION).add({ nombre: cliente, zona, telefono }).catch(() => {});
  }

  db.collection(DEBTS_COLLECTION).add({ cliente, zona, telefono, monto, fechaEntrega, fechaLimite, detalle, estado: "pendiente" })
    .catch(() => alert("No se pudo guardar. Revisá tu conexión a internet."));

  document.getElementById("f_cliente").value = "";
  document.getElementById("f_telefono").value = "";
  document.getElementById("f_monto").value = "";
  document.getElementById("f_detalle").value = "";
  document.getElementById("f_fechaEntrega").value = todayISO();
  document.getElementById("f_fechaLimite").value = todayISO();

  modalOverlay.style.display = "none";
  render();
});

function exportBackup() {
  const headers = ["cliente","zona","telefono","monto","fechaEntrega","fechaLimite","detalle","estado","fechaCobro"];
  const rows = debts.map(d => headers.map(h => {
    let v = d[h] === undefined || d[h] === null ? "" : String(d[h]);
    if (v.includes(",") || v.includes('"') || v.includes("\n")) {
      v = '"' + v.replace(/"/g, '""') + '"';
    }
    return v;
  }).join(","));
  const csv = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const fecha = todayISO();
  a.href = url;
  a.download = `backup_deudas_bermejo_${fecha}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function parseCsvLine(line) {
  const result = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { result.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function importBackup(file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      let text = e.target.result.replace(/^\uFEFF/, "");
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      const headers = parseCsvLine(lines[0]);
      const imported = lines.slice(1).map(line => {
        const cols = parseCsvLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = cols[i] !== undefined ? cols[i] : ""; });
        obj.monto = Number(obj.monto) || 0;
        return obj;
      });
      if (!confirm(`Se encontraron ${imported.length} deudas en el archivo. Esto va a REEMPLAZAR todos los datos actuales en TODOS los dispositivos conectados. ¿Continuar?`)) return;

      const existing = await db.collection(DEBTS_COLLECTION).get();
      const delBatch = db.batch();
      existing.docs.forEach((d) => delBatch.delete(d.ref));
      await delBatch.commit();

      const addBatch = db.batch();
      imported.forEach((obj) => {
        const ref = db.collection(DEBTS_COLLECTION).doc();
        addBatch.set(ref, obj);
      });
      await addBatch.commit();

      alert("Backup restaurado correctamente en todos los dispositivos.");
    } catch (err) {
      alert("No se pudo restaurar el backup. Verificá que sea un archivo exportado desde esta misma app y que tengas conexión a internet.");
    }
  };
  reader.readAsText(file, "UTF-8");
}

document.getElementById("exportBtn").addEventListener("click", exportBackup);
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", (e) => {
  if (e.target.files && e.target.files[0]) importBackup(e.target.files[0]);
  e.target.value = "";
});

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
